# Talkatone 全面分流 - Quantumult X 配置片段
# raw: https://raw.githubusercontent.com/carlleilzj/Talkatone_Rules/main/QuantumultX/Talkatone.conf
#
# 使用步骤:
# 1. 在 [policy] 中加入 Talkatone 策略组（改成你的美国节点名）
# 2. 在 [filter_remote] 或 [filter_local] 引入规则
# 3. 规则务必放在 FINAL 之前；广告规则建议放在分流规则之前

# ---------- 策略组示例（按需改节点名）----------
# [policy]
# static=Talkatone, proxy, 美国节点1, 美国节点2, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
# 或:
# url-latency-benchmark=Talkatone, server-tag-regex=^(?=.*(美|US|United States|Los Angeles|LA|San Jose|SJ)).*$, check-interval=600, tolerance=50

# ---------- 远程规则（推荐）----------
# [filter_remote]
# https://raw.githubusercontent.com/carlleilzj/Talkatone_Rules/main/QuantumultX/Talkatone_Ads.list, tag=Talkatone广告, update-interval=86400, opt-parser=true, enabled=true
# https://raw.githubusercontent.com/carlleilzj/Talkatone_Rules/main/QuantumultX/Talkatone.list, tag=Talkatone分流, update-interval=86400, opt-parser=true, enabled=true

# ---------- 本地完整规则（可直接粘贴到 [filter_local]）----------
