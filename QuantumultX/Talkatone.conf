# Talkatone 全面分流 + 加强去广告 - Quantumult X
# https://raw.githubusercontent.com/carlleilzj/Talkatone_Rules/main/QuantumultX/Talkatone.conf
#
# ========== 推荐安装方式 ==========
#
# [policy]
# static=Talkatone, 美国节点1, 美国节点2, proxy, direct
#
# [filter_remote]
# # 1) 广告必须在最前；策略是 reject，不用节点
# https://raw.githubusercontent.com/carlleilzj/Talkatone_Rules/main/QuantumultX/Talkatone_Ads.list, tag=Talkatone广告, update-interval=86400, opt-parser=true, enabled=true
# # 2) 业务分流 → Talkatone 策略组（美国节点）
# https://raw.githubusercontent.com/carlleilzj/Talkatone_Rules/main/QuantumultX/Talkatone.list, tag=Talkatone分流, update-interval=86400, opt-parser=true, enabled=true
#
# [rewrite_remote]
# https://raw.githubusercontent.com/carlleilzj/Talkatone_Rules/main/QuantumultX/Talkatone_Ads_Rewrite.conf, tag=Talkatone广告重写, update-interval=86400, opt-parser=true, enabled=true
#
# 然后: 更新全部远程资源 → 开启 HTTPS 解密 → 杀掉 Talkatone 重开
# 若仍有广告: 打开「最近请求」搜索 ad/smaato/inmobi/applovin，把域名发我补规则

[filter_local]
# 广告（节选，完整请用远程 Talkatone_Ads.list）
host-keyword, googleads, reject
host-suffix, doubleclick.net, reject
host-suffix, googlesyndication.com, reject
host-suffix, amazon-adsystem.com, reject
host-suffix, smaato.net, reject
host-suffix, pubmatic.com, reject
host-suffix, criteo.com, reject
host-suffix, inmobi.com, reject
host-suffix, inmobicdn.net, reject
host-suffix, mobilefuse.com, reject
host-suffix, inner-active.mobi, reject
host-suffix, applovin.com, reject
host-suffix, applvn.com, reject
host-suffix, vungle.com, reject
host-suffix, ironsrc.com, reject
host-suffix, mintegral.com, reject
host-suffix, pangle.io, reject
host-suffix, liftoff.io, reject
host-suffix, adjust.com, reject
host-suffix, appsflyer.com, reject
host-suffix, kochava.com, reject
host-suffix, jampp.com, reject

# 业务
host-suffix, talkatone.com, Talkatone
host-suffix, talkamobile.com, Talkatone
host-suffix, tktn.at, Talkatone
host-suffix, tktn.be, Talkatone
host-suffix, tenor.com, Talkatone
ip-cidr, 50.117.27.0/24, Talkatone
ip-cidr, 63.251.124.0/24, Talkatone
ip-cidr, 69.46.75.0/24, Talkatone
ip-cidr, 104.244.53.0/24, Talkatone
ip-cidr, 131.153.5.0/24, Talkatone
ip-cidr, 131.153.7.0/24, Talkatone
ip-cidr, 198.24.160.0/24, Talkatone
ip-cidr, 198.24.161.0/24, Talkatone
ip-cidr, 198.24.163.0/24, Talkatone
ip-cidr, 198.24.183.0/24, Talkatone
ip-cidr, 205.164.56.0/24, Talkatone
ip-cidr, 216.172.154.0/24, Talkatone
