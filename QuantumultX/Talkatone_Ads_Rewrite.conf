# Talkatone 去广告重写 - Quantumult X
# raw: https://raw.githubusercontent.com/carlleilzj/Talkatone_Rules/main/QuantumultX/Talkatone_Ads_Rewrite.conf
#
# 安装:
# [rewrite_remote]
# https://raw.githubusercontent.com/carlleilzj/Talkatone_Rules/main/QuantumultX/Talkatone_Ads_Rewrite.conf, tag=Talkatone广告重写, update-interval=86400, opt-parser=true, enabled=true
#
# 并确保 HTTPS 解密已开；hostname 见下方 [mitm]
# 规则型 reject 拦域名；本文件拦具体广告 URL / 返回空图

[rewrite_local]
# 广告图片 / 素材
^https?:\/\/cdn\.mobilefuse\.com\/ url reject-img
^https?:\/\/cdn2\.inner-active\.mobi\/ url reject-img
^https?:\/\/cdn-f\.adsmoloco\.com\/ url reject-img
^https?:\/\/cdn\.liftoff-creatives\.io\/ url reject-img
^https?:\/\/imgx\.jampp\.com\/ url reject-img
^https?:\/\/impression\.link\/ url reject-200
^https?:\/\/impression-asia\.liftoff\.io\/ url reject-200
^https?:\/\/wv\.inner-active\.mobi\/ url reject-200

# 广告 SDK / 竞价 API
^https?:\/\/mfx\.mobilefuse\.com\/ url reject-dict
^https?:\/\/ads\.pubmatic\.com\/ url reject-dict
^https?:\/\/ads\.inmobi\.com\/ url reject-dict
^https?:\/\/config\.inmobi\.com\/ url reject-dict
^https?:\/\/sdk-hb-cfg\.smaato\.net\/ url reject-dict
^https?:\/\/sdk-files\.smaato\.net\/ url reject-dict
^https?:\/\/sdk-dnt\.ad\.smaato\.net\/ url reject-dict
^https?:\/\/ets-.*\.track\.smaato\.net\/ url reject-dict
^https?:\/\/sdk-events\.inner-active\.mobi\/ url reject-dict
^https?:\/\/exchange-b-events\.inner-active\.mobi\/ url reject-dict
^https?:\/\/ssp\.api\.tappx\.com\/ url reject-dict
^https?:\/\/ins\.track\.tappx\.com\/ url reject-dict
^https?:\/\/bidder\.criteo\.com\/ url reject-dict
^https?:\/\/.*\.amazon-adsystem\.com\/ url reject-dict
^https?:\/\/googleads\.g\.doubleclick\.net\/ url reject-dict
^https?:\/\/pagead2\.googlesyndication\.com\/ url reject-dict
^https?:\/\/pagead2\.googlesyndication-cn\.com\/ url reject-dict
^https?:\/\/.*\.applovin\.com\/ url reject-dict
^https?:\/\/.*\.applvn\.com\/ url reject-dict
^https?:\/\/.*unityads\.unity3d\.com\/ url reject-dict
^https?:\/\/.*\.vungle\.com\/ url reject-dict
^https?:\/\/.*\.ironsrc\.com\/ url reject-dict
^https?:\/\/.*\.supersonicads\.com\/ url reject-dict
^https?:\/\/.*\.mintegral\.(com|net)\/ url reject-dict
^https?:\/\/.*\.pangle\.io\/ url reject-dict
^https?:\/\/.*\.pangle-b\.io\/ url reject-dict
^https?:\/\/alt-r\.my\.com\/mobile url reject-dict
^https?:\/\/view\.adjust\.com\/ url reject-200
^https?:\/\/app\.appsflyer\.com\/ url reject-200
^https?:\/\/.*\.kochava\.com\/ url reject-dict

# Talkatone 自身偶发广告位（保守：只拦明显 ads 路径）
^https?:\/\/([a-z0-9-]+\.)?talkatone\.com\/.*(\/ads?\/|\/advert|banner|sponsored) url reject-dict

[mitm]
hostname = cdn.mobilefuse.com, mfx.mobilefuse.com, *.mobilefuse.com, cdn2.inner-active.mobi, wv.inner-active.mobi, *.inner-active.mobi, cdn-f.adsmoloco.com, *.adsmoloco.com, impression.link, impression-asia.liftoff.io, cdn.liftoff-creatives.io, *.liftoff.io, imgx.jampp.com, *.jampp.com, ads.pubmatic.com, *.pubmatic.com, ads.inmobi.com, config.inmobi.com, *.inmobi.com, *.smaato.net, ssp.api.tappx.com, *.tappx.com, bidder.criteo.com, *.criteo.com, *.amazon-adsystem.com, googleads.g.doubleclick.net, pagead2.googlesyndication.com, pagead2.googlesyndication-cn.com, *.applovin.com, *.applvn.com, *.unityads.unity3d.com, *.vungle.com, *.ironsrc.com, *.supersonicads.com, *.mintegral.com, *.mintegral.net, *.pangle.io, *.pangle-b.io, alt-r.my.com, view.adjust.com, app.appsflyer.com, *.kochava.com, *.talkatone.com
